version: "3"

env:
  COREPACK_HOME: "{{.TASKFILE_DIR}}/.cache/corepack"

vars:
  FRONTEND_DIR: frontend

tasks:
  default:
    desc: show available commands
    cmds:
      - task --list

  help:
    desc: show available commands
    cmds:
      - task --list

  setup:
    desc: install frontend deps and prefetch Rust deps
    deps:
      - frontend:install
      - rust:fetch

  doctor:
    desc: show the local toolchain and platform state
    silent: true
    cmds:
      - cmd: |
          echo "rustc    $(rustc --version)"
          echo "cargo    $(cargo --version)"
          echo "rustfmt  $(cargo fmt --version 2>/dev/null || echo missing)"
          echo "clippy   $(cargo clippy --version 2>/dev/null || echo missing)"
          echo "node     $(node --version)"
          echo "corepack $(corepack --version)"
          if command -v task >/dev/null 2>&1; then
            echo "task     $(task --version)"
          else
            echo "task     optional"
          fi
          if [ -n "${WSL_DISTRO_NAME:-}" ]; then
            echo "wsl      yes"
            if [ -n "${WAYLAND_DISPLAY:-}" ] || [ -n "${DISPLAY:-}" ]; then
              echo "gui      detected"
            else
              echo "gui      missing, use 'dev-web' or run under WSLg"
            fi
          else
            echo "wsl      no"
          fi
        platforms: [linux, darwin]
      - cmd: >
          powershell.exe -NoProfile -Command
          "Write-Host ('rustc    ' + (rustc --version));
          Write-Host ('cargo    ' + (cargo --version));
          try { Write-Host ('rustfmt  ' + (cargo fmt --version)) } catch { Write-Host 'rustfmt  missing' };
          try { Write-Host ('clippy   ' + (cargo clippy --version)) } catch { Write-Host 'clippy   missing' };
          Write-Host ('node     ' + (node --version));
          Write-Host ('corepack ' + (corepack --version));
          try { Write-Host ('task     ' + (task --version)) } catch { Write-Host 'task     optional' };
          Write-Host 'wsl      no'"
        platforms: [windows]

  frontend:install:
    desc: install frontend deps
    aliases: [setup:frontend]
    cmds:
      - corepack pnpm --dir {{.FRONTEND_DIR}} install --frozen-lockfile --ignore-scripts

  frontend:check:
    desc: run frontend typecheck
    cmds:
      - corepack pnpm --dir {{.FRONTEND_DIR}} run check

  frontend:build:
    desc: build frontend bundle
    cmds:
      - corepack pnpm --dir {{.FRONTEND_DIR}} run build

  frontend:watch:
    desc: rebuild frontend assets on file changes
    aliases: [watch]
    cmds:
      - corepack pnpm --dir {{.FRONTEND_DIR}} run watch

  frontend:serve:
    desc: run frontend-only dev server
    aliases: [dev-web, web]
    cmds:
      - corepack pnpm --dir {{.FRONTEND_DIR}} run dev

  rust:fetch:
    desc: prefetch Rust dependencies
    cmds:
      - cargo fetch --locked

  rust:fmt:
    desc: run cargo fmt check for the Rust workspace
    cmds:
      - cargo fmt --all --check

  rust:fmt:fix:
    desc: format Rust code
    cmds:
      - cargo fmt --all

  rust:check:
    desc: run cargo check for the Rust workspace
    cmds:
      - cargo check --workspace --locked

  rust:clippy:
    desc: run clippy for the Rust workspace
    cmds:
      - cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  rust:test:
    desc: run cargo test for the Rust workspace
    cmds:
      - cargo test --workspace --locked

  rust:api:
    desc: run the Rust API
    cmds:
      - cargo run --locked -p croopor-api

  rust:desktop:
    desc: run the Rust desktop shell
    aliases: [dev, dev-desktop, desktop:dev]
    cmds:
      - cargo run --locked -p croopor-desktop

  build:
    desc: build the desktop app in release mode
    aliases: [build-local]
    deps:
      - frontend:build
    cmds:
      - cargo build --locked -p croopor-desktop --release

  build:dev:
    desc: build the desktop app in dev mode
    aliases: [build-dev, build-local-dev]
    deps:
      - frontend:build
    cmds:
      - cargo build --locked -p croopor-desktop

  build:api:
    desc: build the API binary in dev mode
    cmds:
      - cargo build --locked -p croopor-api

  build:api:release:
    desc: build the API binary in release mode
    cmds:
      - cargo build --locked -p croopor-api --release

  check:
    desc: run static checks
    deps:
      - frontend:check
      - rust:fmt
      - rust:check
      - rust:clippy

  test:
    desc: run Rust tests
    deps:
      - rust:test

  verify:
    desc: run checks, tests, and a release desktop build
    deps:
      - frontend:build
      - check
      - test
    cmds:
      - cargo build --locked -p croopor-desktop --release

  clean:
    desc: remove build outputs and caches
    cmds:
      - cargo clean
      - cmd: rm -rf dist
        platforms: [linux, darwin]
      - cmd: >
          powershell.exe -NoProfile -Command
          "if (Test-Path 'dist') { Remove-Item -Recurse -Force 'dist' }"
        platforms: [windows]
