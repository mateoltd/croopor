version: "3"

env:
  GOCACHE: "{{.TASKFILE_DIR}}/.cache/go-build"
  COREPACK_HOME: "{{.TASKFILE_DIR}}/.cache/corepack"
  GOBIN: "{{.TASKFILE_DIR}}/.tools/bin"

vars:
  FRONTEND_DIR: frontend
  BIN_DIR: build/bin
  TOOLS_DIR: .tools/bin

tasks:
  default:
    desc: show available commands
    cmds:
      - task --list

  help:
    desc: show available commands
    cmds:
      - task --list

  setup:
    desc: install go deps, frontend deps, and the local wails cli
    deps:
      - deps:go
      - tools:wails
      - frontend:install

  doctor:
    desc: show the local toolchain and platform state
    silent: true
    cmds:
      - cmd: |
          echo "go      $(go version)"
          echo "node    $(node --version)"
          echo "corepack $(corepack --version)"
          echo "task    $(task --version)"
          if command -v wails >/dev/null 2>&1; then
            echo "wails   $(wails version | head -n 1)"
          else
            echo "wails   missing"
          fi
          if [ -n "${WSL_DISTRO_NAME:-}" ]; then
            echo "wsl     yes"
            if [ -n "${WAYLAND_DISPLAY:-}" ] || [ -n "${DISPLAY:-}" ]; then
              echo "gui     detected"
            else
              echo "gui     missing, use 'dev-web' or run under WSLg"
            fi
          else
            echo "wsl     no"
          fi
        platforms: [linux, darwin]
      - cmd: >
          powershell.exe -NoProfile -Command
          "$wails = if (Get-Command wails -ErrorAction SilentlyContinue) { (wails version | Select-Object -First 1) } else { 'missing' };
          Write-Host ('go      ' + (go version));
          Write-Host ('node    ' + (node --version));
          Write-Host ('corepack ' + (corepack --version));
          Write-Host ('task    ' + (task --version));
          Write-Host ('wails   ' + $wails);
          Write-Host 'wsl     no'"
        platforms: [windows]

  frontend:install:
    desc: install frontend deps
    aliases: [setup:frontend]
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - corepack pnpm install --frozen-lockfile --ignore-scripts

  frontend:check:
    desc: run frontend typecheck
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - corepack pnpm run check

  frontend:build:
    desc: build frontend bundle
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - corepack pnpm run build

  frontend:watch:
    desc: rebuild frontend assets on file changes
    aliases: [watch]
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - corepack pnpm run watch

  frontend:serve:
    desc: run frontend-only dev server
    aliases: [dev-web, web]
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - corepack pnpm run dev

  fmt:check:
    desc: fail if go files are not formatted
    cmds:
      - cmd: |
          out="$(gofmt -l $(find . -type f -name '*.go' -not -path './build/*' -not -path './vendor/*'))"
          if [ -n "$out" ]; then
            echo "$out"
            exit 1
          fi
        platforms: [linux, darwin]
      - cmd: >
          powershell.exe -NoProfile -Command
          "$files = Get-ChildItem -Recurse -Filter *.go | Where-Object { $_.FullName -notmatch '\\build\\' -and $_.FullName -notmatch '\\vendor\\' };
          $out = @();
          foreach ($file in $files) { $fmt = gofmt -l $file.FullName; if ($fmt) { $out += $fmt } };
          if ($out.Count -gt 0) { $out | ForEach-Object { Write-Host $_ }; exit 1 }"
        platforms: [windows]

  check:
    desc: run fast checks
    deps:
      - frontend:check
      - fmt:check

  deps:go:
    desc: download go modules
    aliases: [setup:go]
    cmds:
      - go mod download

  test:
    desc: run go tests
    cmds:
      - go test ./...

  build:
    desc: build the native release binary for this machine
    aliases: [build-local]
    deps:
      - frontend:build
      - _prepare:bin-dir
    cmds:
      - cmd: go build -trimpath -tags webkit2_41 -o {{.BIN_DIR}}/croopor .
        platforms: [linux]
      - cmd: go build -trimpath -o {{.BIN_DIR}}/croopor .
        platforms: [darwin]
      - cmd: go build -trimpath -o {{.BIN_DIR}}/croopor.exe .
        platforms: [windows]

  build:dev:
    desc: build the native dev binary for this machine
    aliases: [build-dev, build-local-dev]
    deps:
      - frontend:build
      - _prepare:bin-dir
    cmds:
      - cmd: go build -trimpath -tags "webkit2_41 dev" -o {{.BIN_DIR}}/croopor-dev .
        platforms: [linux]
      - cmd: go build -trimpath -tags dev -o {{.BIN_DIR}}/croopor-dev .
        platforms: [darwin]
      - cmd: go build -trimpath -tags dev -o {{.BIN_DIR}}/croopor-dev.exe .
        platforms: [windows]

  build:windows:
    desc: build the windows amd64 release binary
    aliases: [build-windows]
    deps:
      - frontend:build
      - winres
      - _prepare:bin-dir
    env:
      GOOS: windows
      GOARCH: amd64
    cmds:
      - go build -trimpath -o {{.BIN_DIR}}/croopor-windows.exe .

  build:windows:dev:
    desc: build the windows amd64 dev binary
    aliases: [build-windows-dev]
    deps:
      - frontend:build
      - winres
      - _prepare:bin-dir
    env:
      GOOS: windows
      GOARCH: amd64
    cmds:
      - go build -trimpath -tags dev -o {{.BIN_DIR}}/croopor-dev-windows.exe .

  run:windows:dev:
    desc: build and launch the windows dev binary
    aliases: [dev-windows]
    deps:
      - build:windows:dev
    cmds:
      - cmd: |
          if [ -z "${WSL_DISTRO_NAME:-}" ]; then
            echo "dev-windows from linux is only supported under WSL."
            exit 1
          fi
          if ! command -v powershell.exe >/dev/null 2>&1 || ! command -v wslpath >/dev/null 2>&1; then
            echo "dev-windows needs powershell.exe and wslpath."
            exit 1
          fi
          win_path="$(wslpath -w "{{.TASKFILE_DIR}}/{{.BIN_DIR}}/croopor-dev-windows.exe")"
          win_dir="$(wslpath -w "{{.TASKFILE_DIR}}/{{.BIN_DIR}}")"
          powershell.exe -NoProfile -Command "Start-Process -FilePath '$win_path' -WorkingDirectory '$win_dir'"
        platforms: [linux]
      - cmd: >
          powershell.exe -NoProfile -Command
          "Start-Process (Resolve-Path 'build/bin/croopor-dev-windows.exe')"
        platforms: [windows]

  wails:dev:
    desc: run desktop dev with wails
    aliases: [dev, dev-desktop]
    deps:
      - tools:wails
    cmds:
      - wails dev

  wails:build:
    desc: build the wails production bundle
    deps:
      - tools:wails
      - frontend:build
    cmds:
      - wails build -nopackage -m -v 1

  verify:
    desc: run checks, tests, and native builds
    deps:
      - check
      - test
      - build
      - wails:build

  release:snapshot:
    desc: build local release artifacts with goreleaser
    aliases: [release-snapshot]
    deps:
      - tools:goreleaser
    cmds:
      - goreleaser release --snapshot --clean

  clean:
    desc: remove build outputs and go caches
    cmds:
      - go clean -cache -testcache
      - cmd: rm -rf build/bin dist
        platforms: [linux, darwin]
      - cmd: >
          powershell.exe -NoProfile -Command
          "if (Test-Path 'build/bin') { Remove-Item -Recurse -Force 'build/bin' };
          if (Test-Path 'dist') { Remove-Item -Recurse -Force 'dist' }"
        platforms: [windows]

  winres:
    desc: generate Windows resource files (.syso) from winres/
    deps:
      - tools:winres
    cmds:
      - go-winres make --arch amd64,arm64

  tools:winres:
    desc: install go-winres into .tools/bin
    internal: true
    silent: true
    cmds:
      - cmd: |
          if command -v go-winres >/dev/null 2>&1 || [ -x "{{.TOOLS_DIR}}/go-winres" ]; then
            exit 0
          fi
          go install github.com/tc-hib/go-winres@latest
        platforms: [linux, darwin]
      - cmd: >
          powershell.exe -NoProfile -Command
          "if ((Get-Command go-winres -ErrorAction SilentlyContinue) -or (Test-Path '.tools/bin/go-winres.exe')) { exit 0 };
          go install github.com/tc-hib/go-winres@latest"
        platforms: [windows]

  tools:wails:
    desc: install the local wails cli into .tools/bin
    internal: true
    silent: true
    cmds:
      - cmd: |
          if command -v wails >/dev/null 2>&1 || [ -x "{{.TOOLS_DIR}}/wails" ]; then
            exit 0
          fi
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
        platforms: [linux, darwin]
      - cmd: >
          powershell.exe -NoProfile -Command
          "if ((Get-Command wails -ErrorAction SilentlyContinue) -or (Test-Path '.tools/bin/wails.exe')) { exit 0 };
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0"
        platforms: [windows]

  tools:goreleaser:
    desc: install local goreleaser into .tools/bin
    internal: true
    silent: true
    cmds:
      - cmd: |
          if command -v goreleaser >/dev/null 2>&1 || [ -x "{{.TOOLS_DIR}}/goreleaser" ]; then
            exit 0
          fi
          go install github.com/goreleaser/goreleaser/v2@v2.8.2
        platforms: [linux, darwin]
      - cmd: >
          powershell.exe -NoProfile -Command
          "if ((Get-Command goreleaser -ErrorAction SilentlyContinue) -or (Test-Path '.tools/bin/goreleaser.exe')) { exit 0 };
          go install github.com/goreleaser/goreleaser/v2@v2.8.2"
        platforms: [windows]

  _prepare:bin-dir:
    internal: true
    cmds:
      - cmd: mkdir -p build/bin
        platforms: [linux, darwin]
      - cmd: powershell.exe -NoProfile -Command "New-Item -ItemType Directory -Force -Path 'build/bin' | Out-Null"
        platforms: [windows]
