name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - rewrite-in-rust
      - wip-*

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile --ignore-scripts

      - name: Frontend format check
        run: pnpm --dir frontend run format:check

      - name: Frontend typecheck
        run: pnpm --dir frontend run check

      - name: Frontend tests
        run: pnpm --dir frontend run test

      - name: Frontend build
        run: pnpm --dir frontend run build

  desktop-linux:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mateoltd/axial-linux-ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Trust checkout as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile --ignore-scripts

      - name: Frontend typecheck
        run: pnpm --dir frontend run check

      - name: Frontend build
        run: pnpm --dir frontend run build

      - name: Rust fmt
        run: cargo fmt --all --check

      - name: Rust check
        run: cargo check --workspace --locked

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --locked

      - name: Release desktop build
        run: cargo build --locked -p axial-desktop --release
