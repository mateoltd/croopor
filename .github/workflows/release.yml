name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
            ldflags: "-s -w -H windowsgui"
          - goos: windows
            goarch: arm64
            ext: .exe
            ldflags: "-s -w -H windowsgui"
          - goos: linux
            goarch: amd64
            ext: ""
            ldflags: "-s -w"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BINARY="croopor-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags='${{ matrix.ldflags }} -X main.version='"${VERSION}" -o "${BINARY}" .

      - uses: actions/upload-artifact@v4
        with:
          name: croopor-${{ matrix.goos }}-${{ matrix.goarch }}
          path: croopor-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: croopor-*
