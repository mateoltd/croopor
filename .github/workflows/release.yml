name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mateoltd/axial-linux-ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Trust checkout as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Verify release version coherence
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" = "$GITHUB_REF_NAME" ] || [ -z "$TAG_VERSION" ]; then
            echo "Release tags must be named v<version>; got '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

          CARGO_VERSION="$(sed -n '/^\[workspace.package\]/,/^\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)"
          TAURI_VERSION="$(node -p "require('./apps/desktop/tauri.conf.json').version")"

          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag version '$TAG_VERSION' does not match Cargo workspace version '$CARGO_VERSION'." >&2
            exit 1
          fi

          if [ "$TAURI_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag version '$TAG_VERSION' does not match Tauri config version '$TAURI_VERSION'." >&2
            exit 1
          fi

          node -e "const version = process.argv[1]; if (!/^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-[0-9A-Za-z-]+(?:\\.[0-9A-Za-z-]+)*)?(?:\\+[0-9A-Za-z-]+(?:\\.[0-9A-Za-z-]+)*)?$/.test(version)) process.exit(1)" "$TAG_VERSION" || {
            echo "Release version '$TAG_VERSION' is not valid SemVer." >&2
            exit 1
          }

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile --ignore-scripts

      - name: Frontend format check
        run: pnpm --dir frontend run format:check

      - name: Frontend typecheck
        run: pnpm --dir frontend run check

      - name: Frontend build
        run: pnpm --dir frontend run build

      - name: Rust fmt
        run: cargo fmt --all --check

      - name: Rust check
        run: cargo check --workspace --locked

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --locked

      - name: Build linux release desktop binary
        env:
          # Telemetry key is a public write-only PostHog project token; keyless builds never upload (docs/TELEMETRY.md).
          AXIAL_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: cargo build --locked -p axial-desktop --release

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-frontend
          path: |
            frontend/static/app.css
            frontend/static/app.js
            frontend/static/chunks
          if-no-files-found: error
          retention-days: 1

      - name: Upload linux release desktop binary
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-amd64
          path: target/release/axial-desktop
          if-no-files-found: error
          retention-days: 1

  linux-desktop:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - name: Download linux release desktop binary
        uses: actions/download-artifact@v4
        with:
          name: release-linux-amd64
          path: target/release

      - name: Package linux desktop binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/linux
          cp target/release/axial-desktop dist/linux/axial
          chmod +x dist/linux/axial
          cp dist/linux/axial "dist/axial-linux-amd64-${VERSION}"
          tar -C dist/linux -czf "dist/axial-linux-amd64-${VERSION}.tar.gz" axial
          (
            cd dist
            sha256sum "axial-linux-amd64-${VERSION}" > "axial-linux-amd64-${VERSION}.sha256"
            sha256sum "axial-linux-amd64-${VERSION}.tar.gz" > "axial-linux-amd64-${VERSION}.tar.gz.sha256"
          )

      - name: Upload linux release asset
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/axial-linux-amd64-*

  windows-desktop:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: release-frontend
          path: frontend/static

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release desktop binary
        env:
          AXIAL_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: cargo build --locked -p axial-desktop --release

      - name: Package windows desktop binary
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          Copy-Item target/release/axial-desktop.exe dist/windows/axial.exe
          $executable = "dist/axial-windows-amd64-$version.exe"
          Copy-Item dist/windows/axial.exe $executable
          $archive = "dist/axial-windows-amd64-$version.zip"
          Compress-Archive -Path dist/windows/axial.exe -DestinationPath $archive -Force
          $executableHash = Get-FileHash -Algorithm SHA256 -Path $executable
          "$($executableHash.Hash.ToLowerInvariant())  $(Split-Path -Leaf $executable)" | Set-Content -Path "$executable.sha256" -NoNewline -Encoding ascii
          $hash = Get-FileHash -Algorithm SHA256 -Path $archive
          "$($hash.Hash.ToLowerInvariant())  $(Split-Path -Leaf $archive)" | Set-Content -Path "$archive.sha256" -NoNewline -Encoding ascii

      - name: Upload windows release asset
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/axial-windows-amd64-*.exe
            dist/axial-windows-amd64-*.exe.sha256
            dist/axial-windows-amd64-*.zip
            dist/axial-windows-amd64-*.zip.sha256

  macos-desktop:
    needs: verify
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: amd64
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: release-frontend
          path: frontend/static

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.9" --locked

      - name: Build macOS app and DMG
        env:
          AXIAL_POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        working-directory: apps/desktop
        run: cargo tauri build --bundles dmg --config '{"build":{"beforeBuildCommand":""}}' -- --locked

      - name: Package macOS release assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/macos
          cp target/release/axial-desktop dist/macos/axial
          chmod +x dist/macos/axial
          tar -C dist/macos -czf "dist/axial-macos-${{ matrix.arch }}-${VERSION}.tar.gz" axial
          set -- target/release/bundle/dmg/*.dmg
          if [ "$#" -ne 1 ] || [ ! -f "$1" ]; then
            echo "Expected exactly one macOS DMG, found $#" >&2
            exit 1
          fi
          cp "$1" "dist/axial-macos-${{ matrix.arch }}-${VERSION}.dmg"
          (
            cd dist
            shasum -a 256 "axial-macos-${{ matrix.arch }}-${VERSION}.dmg" > "axial-macos-${{ matrix.arch }}-${VERSION}.dmg.sha256"
            shasum -a 256 "axial-macos-${{ matrix.arch }}-${VERSION}.tar.gz" > "axial-macos-${{ matrix.arch }}-${VERSION}.tar.gz.sha256"
          )

      - name: Upload macOS release asset
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/axial-macos-${{ matrix.arch }}-*

  verify-release:
    needs: [linux-desktop, windows-desktop, macos-desktop]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify release assets are published and downloadable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/verify-release-assets.mjs
