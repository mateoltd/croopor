name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mateoltd/croopor-linux-ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Trust checkout as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Verify release version coherence
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" = "$GITHUB_REF_NAME" ] || [ -z "$TAG_VERSION" ]; then
            echo "Release tags must be named v<version>; got '$GITHUB_REF_NAME'." >&2
            exit 1
          fi

          CARGO_VERSION="$(sed -n '/^\[workspace.package\]/,/^\[/{s/^version = "\(.*\)"/\1/p}' Cargo.toml)"
          TAURI_VERSION="$(node -p "require('./apps/desktop/tauri.conf.json').version")"

          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag version '$TAG_VERSION' does not match Cargo workspace version '$CARGO_VERSION'." >&2
            exit 1
          fi

          if [ "$TAURI_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag version '$TAG_VERSION' does not match Tauri config version '$TAURI_VERSION'." >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile --ignore-scripts

      - name: Frontend typecheck
        run: pnpm --dir frontend run check

      - name: Frontend build
        run: pnpm --dir frontend run build

      - name: Rust fmt
        run: cargo fmt --all --check

      - name: Rust check
        run: cargo check --workspace --locked

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --locked

      - name: Release desktop build
        run: cargo build --locked -p croopor-desktop --release

  linux-desktop:
    needs: verify
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/mateoltd/croopor-linux-ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Trust checkout as a safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile --ignore-scripts

      - name: Build frontend bundle
        run: pnpm --dir frontend run build

      - name: Build release desktop binary
        run: cargo build --locked -p croopor-desktop --release

      - name: Package linux desktop binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/linux
          cp target/release/croopor-desktop dist/linux/croopor
          chmod +x dist/linux/croopor
          tar -C dist/linux -czf "dist/croopor-linux-amd64-${VERSION}.tar.gz" croopor

      - name: Upload linux release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/croopor-linux-amd64-*.tar.gz

  windows-desktop:
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile --ignore-scripts

      - name: Build frontend bundle
        run: pnpm --dir frontend run build

      - name: Build release desktop binary
        run: cargo build --locked -p croopor-desktop --release

      - name: Package windows desktop binary
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          Copy-Item target/release/croopor-desktop.exe dist/windows/croopor.exe
          Compress-Archive -Path dist/windows/croopor.exe -DestinationPath "dist/croopor-windows-amd64-$version.zip" -Force

      - name: Upload windows release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/croopor-windows-amd64-*.zip
